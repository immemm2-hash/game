<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>캔디 썸10</title>
  <style>
    :root {
      --outer-a: #e8f1ec;
      --outer-b: #dce8ee;
      --board-bg: #f7f3ea;
      --grid-line: #e8dfd2;
      --num-white: #ffffff;
      --ink-main: #4f5e5a;
      --frame-radius: 34px;
      --cell: 33px;
      --gap: 3px;
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #eef3f1 0%, #e5ecef 100%);
      font-family: "Trebuchet MS", "Verdana", Arial, sans-serif;
    }

    .game {
      width: min(100vw, 760px);
      border-radius: var(--frame-radius);
      background: linear-gradient(145deg, var(--outer-a), var(--outer-b));
      box-shadow: 0 8px 20px #5563841e;
      border: 1px solid #ffffffc0;
      padding: 54px 22px 12px;
      position: relative;
    }

    .play-wrap {
      display: grid;
      grid-template-columns: 1fr 22px;
      gap: 10px;
      align-items: start;
    }

    .board-stage {
      position: relative;
      width: fit-content;
      height: fit-content;
      contain: layout paint;
    }

    .game-over {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #00000040;
      border-radius: 18px;
      z-index: 3;
      pointer-events: none;
    }

    .game-over.show {
      display: flex;
    }

    .game-over-card {
      background: #ffffffde;
      border: 1px solid #ffffff;
      border-radius: 14px;
      padding: 12px 16px;
      color: #4f5e5a;
      font-weight: 800;
      box-shadow: 0 8px 16px #00000022;
      text-align: center;
      line-height: 1.3;
    }


    .board {
      border-radius: 18px;
      border: 1px solid #d5cec2;
      background-color: var(--board-bg);
      background-image:
        radial-gradient(circle at 8px 8px, #ece2d4 1.1px, transparent 1.2px),
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: 16px 16px, 10px 10px, 10px 10px;
      display: grid;
      grid-template-columns: repeat(17, var(--cell));
      gap: var(--gap);
      justify-content: center;
      padding: 10px;
      min-height: 388px;
    }


    .drag-layer,
    .fx-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .drag-layer {
      overflow: hidden;
    }

    .path-overlay {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .path-line {
      fill: none;
      stroke: #6c8f86;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .8;
    }

    .path-dot {
      fill: #6c8f86;
      opacity: .9;
    }

    .fx-layer {
      z-index: 2;
      overflow: visible;
    }

    .cell {
      width: var(--cell);
      height: var(--cell);
      border: 2px solid #ffffffde;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 20%, #ffffff99 0 18%, transparent 20%),
        linear-gradient(160deg,
          hsl(var(--tileHue, 26) 42% 67%),
          hsl(calc(var(--tileHue, 26) + 6) 44% 57%));
      color: var(--num-white);
      font-family: inherit;
      font-size: 21px;
      font-weight: 800;
      line-height: 1;
      padding: 0;
      text-shadow: 0 2px 0 #00000024;
      display: grid;
      place-items: center;
      cursor: pointer;
      transform: translateZ(0);
      will-change: transform, filter;
      transition: filter .08s linear, transform .08s linear;
      box-shadow: 0 2px 0 #00000018;
      position: relative;
    }

    .cell::before {
      content: "";
      position: absolute;
      top: -4px;
      left: 52%;
      width: 10px;
      height: 6px;
      border-radius: 999px;
      background: #81b66f;
      transform: rotate(-28deg);
      opacity: .9;
    }

    .cell.sel {
      filter: brightness(1.06);
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 0 0 2px #ecdfc9, 0 3px 6px #00000018;
    }

    .cell.dead {
      animation: vanish .24s cubic-bezier(.22, .74, .24, 1) forwards;
    }

    .empty {
      width: var(--cell);
      height: var(--cell);
      border-radius: 50%;
      background: transparent;
    }

    .flash {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffffff 0 30%, #fff2b8 52%, #ffd890 72%, transparent 84%);
      transform: translate(-50%, -50%) scale(.45);
      animation: flashBurst .28s ease-out forwards;
      box-shadow: 0 0 16px #ffe6a8;
      pointer-events: none;
    }

    .shockwave {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #ffd89a;
      transform: translate(-50%, -50%) scale(.5);
      animation: shockwave .36s ease-out forwards;
      box-shadow: 0 0 10px #ffdba4;
      pointer-events: none;
    }

    .impact-core {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff9da 0 30%, #ffd07c 58%, #ff9f57 82%, transparent 88%);
      transform: translate(-50%, -50%) scale(.4);
      animation: corePop .24s ease-out forwards;
      pointer-events: none;
    }

    .blast-star {
      position: absolute;
      width: 22px;
      height: 22px;
      background: radial-gradient(circle, #fff7ca 0 38%, #ffc85e 68%, transparent 78%);
      clip-path: polygon(50% 0%, 62% 34%, 100% 50%, 62% 66%, 50% 100%, 38% 66%, 0% 50%, 38% 34%);
      transform: translate(-50%, -50%) scale(.35) rotate(0deg);
      animation: starBurst .32s ease-out forwards;
      filter: drop-shadow(0 0 10px #ffd78f);
      pointer-events: none;
    }

    .burst-glow {
      position: absolute;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: radial-gradient(circle, #fffef2 0 30%, #ffd777 52%, #ff9d57 74%, transparent 84%);
      transform: translate(-50%, -50%) scale(.3);
      animation: burstGlow .36s ease-out forwards;
      filter: drop-shadow(0 0 18px #ffd88e);
      pointer-events: none;
    }

    .shockwave-strong {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 3px solid #ffe7b3;
      transform: translate(-50%, -50%) scale(.45);
      animation: strongWave .3s ease-out forwards;
      box-shadow: 0 0 14px #ffd084;
      pointer-events: none;
    }

    .impact-text {
      position: absolute;
      transform: translate(-50%, -50%) scale(.4);
      font: 900 18px/1 "Trebuchet MS", Arial, sans-serif;
      color: #fff8d8;
      text-shadow: 0 0 8px #ffbe5f, 0 2px 0 #b85f2a;
      letter-spacing: .4px;
      animation: impactText .36s ease-out forwards;
      pointer-events: none;
      white-space: nowrap;
    }

    .spark {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff6cb 0 35%, #ffd087 70%, #ffb86e 100%);
      box-shadow: 0 0 8px #ffd59a;
      transform: translate(-50%, -50%);
      animation: sparkFly .4s ease-out forwards;
      pointer-events: none;
      opacity: 1;
    }

    @keyframes flashBurst {
      to {
        transform: translate(-50%, -50%) scale(2.8);
        opacity: 0;
      }
    }

    @keyframes shockwave {
      to {
        transform: translate(-50%, -50%) scale(3.6);
        opacity: 0;
      }
    }

    @keyframes vanish {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      22% {
        transform: scale(1.08);
        opacity: 1;
      }

      62% {
        transform: scale(0.86);
        opacity: 1;
      }

      to {
        transform: scale(0.28);
        opacity: 0;
      }
    }

    @keyframes corePop {
      to {
        transform: translate(-50%, -50%) scale(2.9);
        opacity: 0;
      }
    }

    @keyframes starBurst {
      to {
        transform: translate(-50%, -50%) scale(2.4) rotate(22deg);
        opacity: 0;
      }
    }

    @keyframes strongWave {
      to {
        transform: translate(-50%, -50%) scale(3.1);
        opacity: 0;
      }
    }

    @keyframes burstGlow {
      to {
        transform: translate(-50%, -50%) scale(2.9);
        opacity: 0;
      }
    }

    @keyframes impactText {
      0% {
        transform: translate(-50%, -50%) scale(.4);
        opacity: 0;
      }

      25% {
        transform: translate(-50%, calc(-50% - 6px)) scale(1.18);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, calc(-50% - 18px)) scale(.96);
        opacity: 0;
      }
    }

    @keyframes sparkFly {
      to {
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy)));
        opacity: 0;
      }
    }

    .cell .num {
      transform: translateY(0);
      font-size: 20px;
      pointer-events: none;
    }

    .meter {
      width: 20px;
      height: 388px;
      display: grid;
      grid-template-rows: 24px 1fr;
      align-items: stretch;
      justify-items: center;
      color: #8e6ea6;
      font-size: 20px;
      line-height: 1;
      font-weight: 700;
    }

    .meter .zero {
      margin-top: 1px;
    }

    .meter-track {
      width: 12px;
      background: #ffffffbd;
      border: 1px solid #d6b6ff;
      position: relative;
      margin-top: 3px;
      border-radius: 999px;
      overflow: hidden;
    }

    .meter-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(to top, #ff7ebe, #ffb17f);
      height: 100%;
    }

    .bottom {
      height: 30px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      padding: 3px 6px 0;
      color: #f7ffe0;
      font-size: 24px;
    }

    #resetBtn {
      min-width: 90px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(to bottom, #ff9fcb, #ff7faf);
      color: #fff;
      font: 800 15px/1 "Trebuchet MS", Arial, sans-serif;
      padding: 0 14px 1px;
      cursor: pointer;
      letter-spacing: .3px;
      box-shadow: 0 4px 0 #df5d92;
    }

    #resetBtn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #df5d92;
    }

    .hud {
      position: absolute;
      left: 16px;
      top: 14px;
      font-size: 13px;
      color: var(--ink-main);
      display: flex;
      gap: 8px;
    }

    .hud span {
      background: #ffffffa1;
      border: 1px solid #ffffffdd;
      border-radius: 999px;
      padding: 4px 10px;
    }

    .status {
      position: absolute;
      right: 18px;
      top: 15px;
      color: #705a85;
      font-size: 12px;
      max-width: 280px;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: #ffffff9f;
      border: 1px solid #ffffffd4;
      border-radius: 999px;
      padding: 4px 10px;
    }

    .hint-ok {
      color: #3c8b63;
    }

    .hint-no {
      color: #ce4f70;
    }

    @media (max-width: 760px) {
      .game {
        width: 100vw;
        border-radius: 0;
      }

      :root {
        --cell: min(4.8vw, 33px);
        --gap: min(0.38vw, 3px);
      }

      .board {
        min-height: calc(10 * var(--cell) + 9 * var(--gap) + 14px);
      }

      .meter {
        height: calc(10 * var(--cell) + 9 * var(--gap) + 14px);
      }
    }
  </style>
</head>

<body>
  <main class="game">
    <div class="hud">
      <span>점수 <b id="score">0</b></span>
      <span>최고점 <b id="best">0</b></span>
      <span>합계 <b id="sum">0</b></span>
    </div>
    <div id="status" class="status">합이 10이 되도록 드래그하세요.</div>

    <div class="play-wrap">
      <div id="boardStage" class="board-stage">
        <section id="board" class="board" aria-label="game board"></section>
        <div id="dragLayer" class="drag-layer" aria-hidden="true">
          <svg id="pathOverlay" class="path-overlay" aria-hidden="true"></svg>
        </div>
        <div id="fxLayer" class="fx-layer" aria-hidden="true"></div>
        <div id="gameOverEl" class="game-over" aria-hidden="true">
          <div class="game-over-card">시간 종료!<br>새로 시작을 눌러 다시 도전하세요.</div>
        </div>
      </div>
      <aside class="meter" aria-hidden="true">
        <div id="timerText" class="zero">60</div>
        <div class="meter-track">
          <div id="meterFill" class="meter-fill"></div>
        </div>
      </aside>
    </div>

    <footer class="bottom">
      <button id="resetBtn" type="button">새로 시작</button>
    </footer>
  </main>

  <script>
    const ROWS = 10;
    const COLS = 17;
    const MIN = 1;
    const MAX = 9;
    const TIME_LIMIT_MS = 60000;

    const boardEl = document.getElementById('board');
    const boardStageEl = document.getElementById('boardStage');
    const dragLayerEl = document.getElementById('dragLayer');
    const fxLayerEl = document.getElementById('fxLayer');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const sumEl = document.getElementById('sum');
    const statusEl = document.getElementById('status');
    const meterFillEl = document.getElementById('meterFill');
    const timerTextEl = document.getElementById('timerText');
    const gameOverEl = document.getElementById('gameOverEl');
    const resetBtn = document.getElementById('resetBtn');

    const pathOverlayEl = document.getElementById('pathOverlay');

    let grid = [];
    let slotEls = [];
    let score = 0;
    let best = Number(localStorage.getItem('apple-sum10-best') || 0);
    let selectedCells = [];
    let selectedCellSet = new Set();
    let selectedSumValue = 0;
    let dragging = false;
    let boardMetrics = null;
    let cellCenters = [];
    let pendingDragPos = null;
    let dragRafId = 0;
    let audioCtx = null;
    let timeLeftMs = TIME_LIMIT_MS;
    let timerRafId = 0;
    let timerLastTs = 0;
    let isGameOver = false;
    let pathLineEl = null;
    let lastStatusText = '';
    let lastStatusCls = '';

    bestEl.textContent = String(best);

    function randInt(a, b) {
      return Math.floor(Math.random() * (b - a + 1)) + a;
    }

    function makeCell() {
      return { value: randInt(MIN, MAX), selected: false, dead: false };
    }

    function updateMeter() {
      const ratio = Math.max(0, Math.min(1, timeLeftMs / TIME_LIMIT_MS));
      meterFillEl.style.height = `${ratio * 100}%`;
      timerTextEl.textContent = String(Math.ceil(timeLeftMs / 1000));
    }

    function stopTimer() {
      if (!timerRafId) return;
      cancelAnimationFrame(timerRafId);
      timerRafId = 0;
      timerLastTs = 0;
    }

    function onTimeOver() {
      isGameOver = true;
      dragging = false;
      pendingDragPos = null;
      if (dragRafId) {
        cancelAnimationFrame(dragRafId);
        dragRafId = 0;
      }
      clearSelections();
      setStatus('시간 종료! 새로 시작을 눌러 다시 도전하세요.', 'hint-no');
      gameOverEl.classList.add('show');
      stopTimer();
    }

    function tickTimer(ts) {
      if (isGameOver) return;
      if (!timerLastTs) timerLastTs = ts;
      const dt = ts - timerLastTs;
      timerLastTs = ts;
      timeLeftMs = Math.max(0, timeLeftMs - dt);
      updateMeter();
      if (timeLeftMs <= 0) {
        onTimeOver();
        return;
      }
      timerRafId = requestAnimationFrame(tickTimer);
    }

    function startTimer() {
      stopTimer();
      timerRafId = requestAnimationFrame(tickTimer);
    }

    function initGrid() {
      grid = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, makeCell));
      slotEls = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
      score = 0;
      selectedCells = [];
      selectedCellSet = new Set();
      selectedSumValue = 0;
      dragging = false;
      isGameOver = false;
      timeLeftMs = TIME_LIMIT_MS;
      gameOverEl.classList.remove('show');
      updateScore(0);
      updateMeter();
      render();
      startTimer();
      setStatus('합이 10이 되도록 드래그하세요.', '');
    }

    function updateScore(delta) {
      score += delta;
      if (score > best) {
        best = score;
        localStorage.setItem('apple-sum10-best', String(best));
      }
      scoreEl.textContent = String(score);
      bestEl.textContent = String(best);
    }

    function clearSelections() {
      for (const [r, c] of selectedCells) {
        if (grid[r][c]) grid[r][c].selected = false;
        const el = slotEls[r][c];
        if (el && el.classList && el.classList.contains('cell')) {
          el.classList.remove('sel');
        }
      }
      selectedCells = [];
      selectedCellSet = new Set();
      selectedSumValue = 0;
      if (sumEl.textContent !== '0') sumEl.textContent = '0';
      renderPathOverlay();
    }

    function setStatus(text, cls) {
      if (text === lastStatusText && cls === lastStatusCls) return;
      lastStatusText = text;
      lastStatusCls = cls;
      statusEl.textContent = text;
      statusEl.className = `status ${cls}`.trim();
    }

    function getGridPosFromPoint(clientX, clientY) {
      const rect = boardMetrics ? boardMetrics.rect : boardEl.getBoundingClientRect();
      if (
        clientX < rect.left || clientX > rect.right ||
        clientY < rect.top || clientY > rect.bottom
      ) return null;

      const cell = boardMetrics ? boardMetrics.cell : parseFloat(getComputedStyle(boardEl).getPropertyValue('--cell'));
      const gap = boardMetrics ? boardMetrics.gap : parseFloat(getComputedStyle(boardEl).gap || '0');
      const padL = boardMetrics ? boardMetrics.padL : parseFloat(getComputedStyle(boardEl).paddingLeft || '0');
      const padT = boardMetrics ? boardMetrics.padT : parseFloat(getComputedStyle(boardEl).paddingTop || '0');
      const step = cell + gap;

      const x = clientX - rect.left - padL;
      const y = clientY - rect.top - padT;
      if (x < 0 || y < 0) return null;

      const maxX = (COLS * cell) + ((COLS - 1) * gap);
      const maxY = (ROWS * cell) + ((ROWS - 1) * gap);
      if (x > maxX || y > maxY) return null;

      const c = Math.max(0, Math.min(COLS - 1, Math.floor(x / step)));
      const r = Math.max(0, Math.min(ROWS - 1, Math.floor(y / step)));
      return [r, c];
    }

    function getSlotCenterInBoard(r, c) {
      return cellCenters[r]?.[c] || null;
    }

    function resizeOverlay() {
      const rect = boardEl.getBoundingClientRect();
      const styles = getComputedStyle(boardEl);
      const cell = parseFloat(styles.getPropertyValue('--cell'));
      const gap = parseFloat(styles.gap || '0');
      const padL = parseFloat(styles.paddingLeft || '0');
      const padT = parseFloat(styles.paddingTop || '0');
      boardMetrics = { rect, cell, gap, padL, padT, step: cell + gap };
      cellCenters = Array.from({ length: ROWS }, (_, r) =>
        Array.from({ length: COLS }, (_, c) => ({
          x: padL + (c * (cell + gap)) + (cell / 2),
          y: padT + (r * (cell + gap)) + (cell / 2)
        }))
      );

      dragLayerEl.style.width = `${rect.width}px`;
      dragLayerEl.style.height = `${rect.height}px`;
      fxLayerEl.style.width = `${rect.width}px`;
      fxLayerEl.style.height = `${rect.height}px`;
    }

    function selectedSum() {
      return selectedSumValue;
    }

    function selectedFilledCells() {
      return selectedCells.filter(([r, c]) => !!grid[r][c]);
    }

    function cellKey(r, c) {
      return `${r},${c}`;
    }

    function isAdjacent(a, b) {
      return Math.abs(a[0] - b[0]) + Math.abs(a[1] - b[1]) === 1;
    }

    function updateSelectionStatus() {
      const nextSumText = String(selectedSumValue);
      if (sumEl.textContent !== nextSumText) sumEl.textContent = nextSumText;
      if (selectedSumValue === 10) setStatus('좋아요! 손을 떼면 사라집니다.', 'hint-ok');
      else if (selectedSumValue > 10) setStatus('10을 넘었습니다.', 'hint-no');
      else setStatus('선을 이어 합계를 10으로 맞추세요.', '');
    }

    function flushSelectionVisuals() {
      updateSelectionStatus();
      renderPathOverlay();
    }

    function addPathCell(pos, deferVisual = false) {
      if (!pos) return;
      const [r, c] = pos;
      if (selectedCells.length === 0) {
        selectedCells.push([r, c]);
        selectedCellSet.add(cellKey(r, c));
        if (grid[r][c]) {
          grid[r][c].selected = true;
          selectedSumValue += grid[r][c].value;
          const firstEl = slotEls[r][c];
          if (firstEl && firstEl.classList && firstEl.classList.contains('cell')) firstEl.classList.add('sel');
        }
        if (!deferVisual) flushSelectionVisuals();
        return true;
      }

      const [lr, lc] = selectedCells[selectedCells.length - 1];
      if (lr === r && lc === c) return false;
      if (!isAdjacent([lr, lc], [r, c])) return false;

      if (selectedCells.length >= 2) {
        const [pr, pc] = selectedCells[selectedCells.length - 2];
        if (pr === r && pc === c) {
          const [rr, rc] = selectedCells.pop();
          selectedCellSet.delete(cellKey(rr, rc));
          if (grid[rr][rc]) {
            grid[rr][rc].selected = false;
            selectedSumValue -= grid[rr][rc].value;
            const backEl = slotEls[rr][rc];
            if (backEl && backEl.classList && backEl.classList.contains('cell')) backEl.classList.remove('sel');
          }
          if (!deferVisual) flushSelectionVisuals();
          return true;
        }
      }

      if (selectedCellSet.has(cellKey(r, c))) return false;

      selectedCells.push([r, c]);
      selectedCellSet.add(cellKey(r, c));
      if (grid[r][c]) {
        grid[r][c].selected = true;
        selectedSumValue += grid[r][c].value;
        const el = slotEls[r][c];
        if (el && el.classList && el.classList.contains('cell')) el.classList.add('sel');
      }
      if (!deferVisual) flushSelectionVisuals();
      return true;
    }

    function traceToPos(targetPos) {
      if (!targetPos) return false;
      if (selectedCells.length === 0) {
        const changed = addPathCell(targetPos, true);
        if (changed) flushSelectionVisuals();
        return changed;
      }
      let [r, c] = selectedCells[selectedCells.length - 1];
      const [tr, tc] = targetPos;
      let changed = false;

      while (r !== tr || c !== tc) {
        const dr = tr - r;
        const dc = tc - c;
        if (Math.abs(dc) >= Math.abs(dr) && dc !== 0) c += Math.sign(dc);
        else if (dr !== 0) r += Math.sign(dr);
        else if (dc !== 0) c += Math.sign(dc);
        if (addPathCell([r, c], true)) changed = true;
      }
      if (changed) flushSelectionVisuals();
      return changed;
    }

    function renderPathOverlay() {
      if (!pathLineEl) {
        pathLineEl = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        pathLineEl.setAttribute('class', 'path-line');
        pathOverlayEl.appendChild(pathLineEl);
      }
      if (!dragging || selectedCells.length < 2 || !boardMetrics) {
        pathLineEl.setAttribute('points', '');
        return;
      }

      const points = selectedCells.map(([r, c]) => {
        const center = getSlotCenterInBoard(r, c);
        return `${center.x},${center.y}`;
      }).join(' ');

      pathLineEl.setAttribute('points', points);
    }

    function spawnBombExplosion(r, c) {
      const center = getSlotCenterInBoard(r, c) || {
        x: (boardMetrics?.rect?.width || boardEl.clientWidth) / 2,
        y: (boardMetrics?.rect?.height || boardEl.clientHeight) / 2
      };

      const addFx = (className, x, y, ttl) => {
        const el = document.createElement('div');
        el.className = className;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        fxLayerEl.appendChild(el);
        setTimeout(() => el.remove(), ttl);
        return el;
      };

      const addTextFx = (x, y, ttl) => {
        const el = document.createElement('div');
        el.className = 'impact-text';
        el.textContent = '팡!';
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        fxLayerEl.appendChild(el);
        setTimeout(() => el.remove(), ttl);
      };

      addFx('burst-glow', center.x, center.y, 360);
      addFx('impact-core', center.x, center.y, 160);
      addFx('blast-star', center.x, center.y, 320);
      addFx('shockwave-strong', center.x, center.y, 320);
      addFx('flash', center.x, center.y, 260);
      addFx('shockwave', center.x, center.y, 320);
      setTimeout(() => addFx('shockwave', center.x, center.y, 260), 75);
      addTextFx(center.x, center.y, 360);
      for (let i = 0; i < 12; i++) {
        const angle = (-Math.PI / 2) + ((Math.random() - 0.5) * 0.9) + (i * 0.22);
        const dist = 14 + Math.random() * 14;
        const spark = addFx('spark', center.x, center.y, 420);
        spark.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
        spark.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
      }
    }



    function ensureAudio() {
      if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return null;
        audioCtx = new AudioContext();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playHitSound(power = 1) {
      const ctx = ensureAudio();
      if (!ctx) return;
      const now = ctx.currentTime;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.1 * power, now + 0.008);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
      gain.connect(ctx.destination);

      const osc1 = ctx.createOscillator();
      osc1.type = 'triangle';
      osc1.frequency.setValueAtTime(190, now);
      osc1.frequency.exponentialRampToValueAtTime(88, now + 0.1);
      osc1.connect(gain);
      osc1.start(now);
      osc1.stop(now + 0.12);

      const osc2 = ctx.createOscillator();
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(420, now);
      osc2.frequency.exponentialRampToValueAtTime(160, now + 0.06);
      osc2.connect(gain);
      osc2.start(now);
      osc2.stop(now + 0.07);
    }

    function triggerHitFeedback(count) {
      if (navigator.vibrate) navigator.vibrate(8);
      playHitSound(Math.min(1.0, 0.72 + (count * 0.04)));
    }

    function finishDrag() {
      if (isGameOver) return;
      if (!dragging) return;
      dragging = false;
      if (dragRafId) {
        cancelAnimationFrame(dragRafId);
        dragRafId = 0;
      }
      if (pendingDragPos) {
        traceToPos(pendingDragPos);
        pendingDragPos = null;
      }

      const s = selectedSum();
      const toHit = selectedFilledCells();
      if (s === 10 && toHit.length > 0) {
        resizeOverlay();
        triggerHitFeedback(toHit.length);
        for (const [r, c] of toHit) spawnBombExplosion(r, c);
        for (const [r, c] of toHit) grid[r][c].dead = true;
        render();
        renderPathOverlay();

        // [버그수정1] selectedCells를 스냅샷으로 캡처:
        // setTimeout 내부에서 외부 변수 selectedCells를 직접 참조하면,
        // 120ms 이내에 새 드래그가 시작될 경우 새 선택 셀이 null 처리되는 치명적 버그.
        const toRemove = [...toHit];
        // [버그수정2] vanish 애니메이션 지속시간(240ms)에 맞춰 타임아웃을 240ms로 수정.
        // 기존 120ms에서는 애니메이션이 절반만 재생된 상태로 DOM이 재생성되었음.
        setTimeout(() => {
          const removed = toRemove.length;
          for (const [r, c] of toRemove) if (grid[r][c]) grid[r][c] = null;
          clearSelections();
          updateScore(removed * 10);
          setStatus(`${removed}개 제거`, 'hint-ok');
          render();
          renderPathOverlay();
        }, 240);
      } else {
        clearSelections();
        if (s === 0) setStatus('합이 10이 되도록 드래그하세요.', '');
        else setStatus('합계가 10이 아닙니다.', 'hint-no');
        render();
      }
    }

    function render() {
      boardEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const it = grid[r][c];
          if (!it) {
            const empty = document.createElement('div');
            empty.className = 'empty slot';
            empty.dataset.r = String(r);
            empty.dataset.c = String(c);
            boardEl.appendChild(empty);
            slotEls[r][c] = empty;
            continue;
          }
          const d = document.createElement('button');
          d.type = 'button';
          d.className = `slot cell${it.selected ? ' sel' : ''}${it.dead ? ' dead' : ''}`;
          d.dataset.r = String(r);
          d.dataset.c = String(c);
          d.dataset.value = String(it.value);
          d.style.setProperty('--tileHue', String(18 + (it.value * 8)));
          d.setAttribute('aria-label', `${r},${c}:${it.value}`);

          const num = document.createElement('span');
          num.className = 'num';
          num.textContent = String(it.value);
          d.appendChild(num);

          boardEl.appendChild(d);
          slotEls[r][c] = d;
        }
      }
      resizeOverlay();
    }

    function scheduleDragUpdate(pos) {
      pendingDragPos = pos;
      if (dragRafId) return;
      dragRafId = requestAnimationFrame(() => {
        dragRafId = 0;
        if (!pendingDragPos) return;
        const last = selectedCells[selectedCells.length - 1];
        if (last && last[0] === pendingDragPos[0] && last[1] === pendingDragPos[1]) {
          pendingDragPos = null;
          return;
        }
        traceToPos(pendingDragPos);
        pendingDragPos = null;
      });
    }

    boardStageEl.addEventListener('pointerdown', (e) => {
      if (isGameOver) return;
      const pos = getGridPosFromPoint(e.clientX, e.clientY);
      if (!pos) return;
      clearSelections();
      dragging = true;
      addPathCell(pos);
      boardStageEl.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    boardStageEl.addEventListener('pointermove', (e) => {
      if (isGameOver) return;
      if (!dragging) return;
      const pos = getGridPosFromPoint(e.clientX, e.clientY);
      if (!pos) return;
      scheduleDragUpdate(pos);
      e.preventDefault();
    });

    boardStageEl.addEventListener('pointerup', finishDrag);
    boardStageEl.addEventListener('pointercancel', finishDrag);

    resetBtn.addEventListener('click', initGrid);
    window.addEventListener('resize', () => {
      resizeOverlay();
      renderPathOverlay();
    });

    initGrid();
  </script>
</body>

</html>
